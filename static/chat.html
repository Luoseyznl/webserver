<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Chat Room</title>
        <style>
        body { margin: 0; padding: 0; font-family: sans-serif; background-color: #f7f7f7; }
        .container { display: flex; height: 100vh; }
        .sidebar { width: 240px; background-color: white; border-right: 1px solid #e8e8e8; display: flex; flex-direction: column; }
        .room-section, .user-section { padding: 12px; border-bottom: 1px solid #e8e8e8; }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .section-header h2 { margin: 0; font-size: 14px; color: #666; }
        .list { overflow-y: auto; }
        .room-item, .user-item { display: flex; align-items: center; padding: 8px; margin-bottom: 2px; border-radius: 4px; cursor: pointer; font-size: 13px; }
        .room-item:hover, .user-item:hover { background-color: #f5f5f5; }
        .room-item.active { background-color: #e6f7ff; color: #1890ff; } /* 选中状态 */
        .room-icon, .user-icon { width: 24px; height: 24px; border-radius: 4px; background-color: #1890ff; color: white; display: flex; align-items: center; justify-content: center; margin-right: 8px; font-size: 12px; }
        .chat-area { flex: 1; display: flex; flex-direction: column; background-color: #fff; }
        .chat-header { padding: 16px; border-bottom: 1px solid #e6e6e6; font-size: 16px; font-weight: 500; display: flex; justify-content: space-between; }
        .messages { flex: 1; overflow-y: auto; padding: 20px; background-color: #f7f7f7; }
        .message { margin-bottom: 15px; max-width: 80%; clear: both; }
        .message.sent { float: right; }
        .message.sent .message-bubble { background-color: #007AFF; color: white; }
        .message-info { font-size: 12px; color: #999; margin-bottom: 4px; }
        .sent .message-info { text-align: right; }
        .message-bubble { padding: 10px 15px; border-radius: 12px; background-color: #e9e9eb; word-wrap: break-word; }
        .input-area { padding: 16px; border-top: 1px solid #e6e6e6; display: flex; gap: 10px; }
        input[type="text"] { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 8px; outline: none; }
        button { padding: 8px 16px; border: none; border-radius: 6px; background-color: #1890ff; color: white; cursor: pointer; }
        button:disabled { background-color: #ccc; }
        .modal { display: none; position: fixed; z-index: 1001; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
        .modal-content { background: white; margin: 15% auto; padding: 20px; width: 300px; border-radius: 8px; }
    </style>
    </head>
    <body>
        <div class="container">
            <div class="sidebar">
                <div class="room-section">
                    <div class="section-header">
                        <h2>聊天室 (<span id="roomCount">0</span>)</h2>
                        <button
                            onclick="document.getElementById('createRoomModal').style.display='block'">+</button>
                    </div>
                    <div id="roomList" class="list"></div>
                </div>
                <div class="user-section">
                    <div class="section-header"><h2>在线用户 (<span
                                id="userCount">0</span>)</h2></div>
                    <div id="userList" class="list"></div>
                </div>
            </div>
            <div class="chat-area">
                <div class="chat-header">
                    <span id="roomTitle">请选择房间</span>
                    <button onclick="logout()">登出</button>
                </div>
                <div class="messages" id="messages"></div>
                <div class="input-area">
                    <input type="text" id="messageInput" placeholder="输入消息..."
                        disabled>
                    <button id="sendButton" onclick="sendMessage()"
                        disabled>发送</button>
                </div>
            </div>
        </div>

        <div id="createRoomModal" class="modal">
            <div class="modal-content">
                <h3>创建房间</h3>
                <input type="text" id="roomName" placeholder="房间名"
                    style="width:100%; margin-bottom:10px;">
                <button onclick="createRoom()">确定</button>
                <button
                    onclick="document.getElementById('createRoomModal').style.display='none'"
                    style="background:#666">取消</button>
            </div>
        </div>

        <script>
        let currentRoom = null;
        let username = sessionStorage.getItem('username');
        let lastMessageTime = 0; // 记录当前房间已收到的最后一条消息的时间戳

        if (!username) window.location.href = '/login.html';

        // 1. 切换房间：清空屏幕并重置时间戳
        function joinRoom(roomName) {
            if (currentRoom === roomName) return;
            
            fetch('/join_room', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ room: roomName, username: username })
            }).then(res => {
                if (!res.ok) throw new Error('加入失败');
                currentRoom = roomName;
                lastMessageTime = 0; // 重置为0，代表从头拉取该房间的所有历史消息
                
                document.getElementById('roomTitle').textContent = roomName;
                document.getElementById('messages').innerHTML = ''; 
                document.getElementById('messageInput').disabled = false;
                document.getElementById('sendButton').disabled = false;
                
                loadMessages();
                updateRoomUI(roomName);
            }).catch(err => alert(err.message));
        }

        // 2. 增量加载：只向后端请求比 lastMessageTime 更新的消息
        function loadMessages() {
            if (!currentRoom) return;

            fetch('/messages', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    room: currentRoom, 
                    since: lastMessageTime,
                    username: username 
                })
            })
            .then(res => res.json())
            .then(messages => {
                if (messages && messages.length > 0) {
                    const maxTimestamp = Math.max(...messages.map(m => m.timestamp));
                    lastMessageTime = maxTimestamp;
                    
                    displayMessages(messages); 
                }
            });
        }

        // 3. UI 追加逻辑：使用 appendChild 而不是 innerHTML，防止旧消息消失
        function displayMessages(messages) {
            const messagesDiv = document.getElementById('messages');
            const wasAtBottom = messagesDiv.scrollHeight - messagesDiv.scrollTop <= messagesDiv.clientHeight + 100;

            messages.forEach(msg => {
                const div = document.createElement('div');
                div.className = `message ${msg.username === username ? 'sent' : ''}`;
                
                // C++ 传回的是毫秒级整数，直接传给 Date 对象即可
                const timeStr = new Date(msg.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

                div.innerHTML = `
                    <div class="message-info">
                        <span class="message-sender">${msg.username === username ? '我' : msg.username}</span>
                        <span class="message-time">${timeStr}</span>
                    </div>
                    <div class="message-bubble">${msg.content}</div>
                `;
                messagesDiv.appendChild(div); // 在末尾追加元素
            });

            // 如果用户之前就在底部，则自动滚动以显示新消息
            if (wasAtBottom) messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const content = input.value.trim();
            if (!content || !currentRoom) return;

            fetch('/send_message', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ room: currentRoom, username: username, content: content })
            }).then(res => {
                if (res.ok) {
                    input.value = '';
                    loadMessages(); // 发送成功后触发拉取，获得即时反馈
                }
            });
        }

        function updateRoomUI(name) {
            document.querySelectorAll('.room-item').forEach(el => {
                el.classList.toggle('active', el.querySelector('.room-name').textContent === name);
            });
        }

        function loadRooms() {
            fetch('/rooms').then(res => res.json()).then(data => {
                const list = document.getElementById('roomList');
                document.getElementById('roomCount').textContent = data.length;
                list.innerHTML = data.map(r => `
                    <div class="room-item ${currentRoom === r.name ? 'active' : ''}" onclick="joinRoom('${r.name}')">
                        <div class="room-icon">${r.name[0]}</div>
                        <div class="room-name">${r.name}</div>
                        <div class="member-count">${r.members.length}人</div>
                    </div>
                `).join('');
            });
        }

        function createRoom() {
            const name = document.getElementById('roomName').value.trim();
            if (!name) return;
            fetch('/create_room', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: name, creator: username })
            }).then(() => {
                document.getElementById('createRoomModal').style.display='none';
                loadRooms();
            });
        }

        function loadUsers() {
            fetch('/users').then(res => res.json()).then(users => {
                const onlineUsers = users.filter(u => u.is_online);
                document.getElementById('userCount').textContent = onlineUsers.length;
                document.getElementById('userList').innerHTML = onlineUsers.map(u => `
                    <div class="user-item">
                        <div class="user-icon">${u.username[0]}</div>
                        <div class="user-name">${u.username === username ? u.username + ' (我)' : u.username}</div>
                    </div>
                `).join('');
            });
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('messageInput').onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };
            loadRooms();
            loadUsers();
            
            // 轮询：定时同步房间、用户和新消息
            setInterval(loadRooms, 5000);
            setInterval(loadUsers, 5000);
            setInterval(loadMessages, 2000); // 消息同步频率略高，保证聊天体验
        });

        function logout() {
            fetch('/logout', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: username })
            }).then(() => {
                sessionStorage.clear();
                window.location.href = '/login.html';
            });
        }
    </script>
    </body>
</html>
