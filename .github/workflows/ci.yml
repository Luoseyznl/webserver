name: C++ CI/CD Pipeline

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  # -------------------------------------------
  # 任务 1：底层逻辑测试 (GTest)
  # -------------------------------------------
  unit-tests:
    name: Build & Run GTest
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Install C++ Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake libsqlite3-dev

    - name: Configure CMake
      run: cmake -B build -S .

    - name: Build Project
      run: cmake --build build -j$(nproc)

    - name: Run Unit Tests
      working-directory: ./build
      run: ctest --output-on-failure

  # -------------------------------------------
  # 任务 2：交付物测试 (Docker Smoke Test)
  # -------------------------------------------
  docker-tests:
    name: Docker Build & Smoke Test
    runs-on: ubuntu-latest
    needs: unit-tests 
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Build Docker Image
      run: docker build -t cpp-chat:test .

    - name: Run Server in Container
      run: |
        docker run -d -p 8080:8080 --name chat_server_test cpp-chat:test
        sleep 3

    - name: Verify Server is Alive (Smoke Test)
      run: curl -v http://localhost:8080

    - name: Print Server Logs (For Debugging)
      if: always() 
      run: docker logs chat_server_test